<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#2978FF" />
    <meta name="description" content="FitForge - Modern health and fitness app with AI coaching, workout plans, and nutrition tracking" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FitForge" />
    <meta name="application-name" content="FitForge" />
    <meta name="msapplication-TileColor" content="#2978FF" />
    <meta name="msapplication-navbutton-color" content="#2978FF" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/logo.png" />
    
    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <title>FitForge - AI Fitness Coach</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- PWA Install Prompt Script -->
    <script>
      let deferredPrompt;
      
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        
        // Show custom install button/banner
        const installBanner = document.createElement('div');
        installBanner.id = 'install-banner';
        installBanner.innerHTML = `
          <div style="
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: linear-gradient(135deg, #2978FF, #5D3FD3);
            color: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(41, 120, 255, 0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          ">
            <div>
              <div style="font-weight: bold; margin-bottom: 4px;">📱 Install FitForge</div>
              <div style="font-size: 14px; opacity: 0.9;">Add to your home screen for the best experience!</div>
            </div>
            <button id="install-btn" style="
              background: rgba(255, 255, 255, 0.2);
              border: 1px solid rgba(255, 255, 255, 0.3);
              color: white;
              padding: 8px 16px;
              border-radius: 8px;
              cursor: pointer;
              font-weight: bold;
            ">Install</button>
            <button id="close-banner" style="
              background: none;
              border: none;
              color: white;
              font-size: 18px;
              cursor: pointer;
              margin-left: 10px;
            ">×</button>
          </div>
        `;
        
        document.body.appendChild(installBanner);
        
        document.getElementById('install-btn').addEventListener('click', () => {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
              console.log('User accepted the install prompt');
            }
            deferredPrompt = null;
            document.body.removeChild(installBanner);
          });
        });
        
        document.getElementById('close-banner').addEventListener('click', () => {
          document.body.removeChild(installBanner);
        });
      });
      
      window.addEventListener('appinstalled', (evt) => {
        console.log('FitForge was installed successfully!');
      });
    </script>
  </body>
</html>
